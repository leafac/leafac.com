<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        color: white;
        background-color: black;
        transform: rotateY(180deg);
      }
      body, h1, h2 {
        font-family: -apple-system;
        font-size: 30px;
        line-height: 1.5;
      }
    </style>
    <script>
      let enabled = false;
      window.addEventListener("keydown", event => { if (event.keyCode === 13) enabled = !enabled; });
      window.setInterval(() => { if (enabled) window.scrollBy(0, 1); }, 50);
    </script>
  </head>
  <body>
    {{ content }}
  </body>
</html>
